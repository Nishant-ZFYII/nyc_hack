<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Social Services Intelligence Engine</title>
<script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0a0a0f; color:#e0e0e0; height:100vh; overflow:hidden; }

/* Layout */
.app { display:grid; grid-template-columns:400px 1fr; height:100vh; }

/* Sidebar */
.sidebar { background:#111118; border-right:1px solid #1e1e2a; display:flex; flex-direction:column; overflow-y:auto; }
.sidebar-header { padding:20px 20px 12px; border-bottom:1px solid #1e1e2a; }
.sidebar-header h1 { color:#76b900; font-size:22px; font-weight:700; }
.sidebar-header p { color:#888; font-size:13px; margin-top:4px; }

/* Category buttons */
.categories { padding:12px 16px; display:flex; flex-wrap:wrap; gap:6px; border-bottom:1px solid #1e1e2a; }
.cat-btn { background:#1a1a24; border:1px solid #2a2a3a; border-radius:20px; padding:6px 14px; color:#ccc; font-size:12px; cursor:pointer; transition:all 0.2s; }
.cat-btn:hover, .cat-btn.active { border-color:#76b900; color:#76b900; background:#76b90015; }

/* Chat area */
.chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:95%; padding:12px 16px; border-radius:12px; font-size:14px; line-height:1.6; animation:fadeIn 0.3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { background:#1e3a00; border:1px solid #76b90044; align-self:flex-end; border-radius:12px 12px 4px 12px; }
.msg.assistant { background:#16161e; border:1px solid #2a2a3a; align-self:flex-start; border-radius:12px 12px 12px 4px; }
.msg.system { background:#1a1a24; border:1px solid #2a2a3a; color:#888; font-size:12px; text-align:center; align-self:center; }

/* Resource cards in chat */
.resource-card { background:#1a1a24; border:1px solid #2a2a3a; border-radius:8px; padding:10px 14px; margin:6px 0; transition:all 0.2s; cursor:pointer; }
.resource-card:hover { border-color:#76b900; transform:translateX(2px); }
.resource-card .name { color:#76b900; font-weight:600; font-size:14px; }
.resource-card .addr { color:#aaa; font-size:12px; margin-top:2px; }
.resource-card .meta { display:flex; gap:8px; margin-top:6px; }
.resource-card .badge { background:#2a2a3a; color:#ccc; padding:2px 8px; border-radius:10px; font-size:11px; }
.resource-card .badge.type { background:#76b90022; color:#76b900; }

/* Input area */
.input-area { padding:12px 16px; border-top:1px solid #1e1e2a; background:#111118; }
.input-row { display:flex; gap:8px; }
.input-area textarea { flex:1; background:#0a0a0f; border:1px solid #2a2a3a; border-radius:10px; padding:10px 14px; color:#e0e0e0; font-size:14px; font-family:inherit; resize:none; outline:none; transition:border-color 0.2s; }
.input-area textarea:focus { border-color:#76b900; box-shadow:0 0 8px #76b90022; }
.input-area textarea::placeholder { color:#555; }
.send-btn { background:linear-gradient(135deg,#76b900,#5a8f00); color:white; border:none; border-radius:10px; padding:10px 20px; font-weight:600; cursor:pointer; transition:all 0.2s; font-size:14px; }
.send-btn:hover { background:linear-gradient(135deg,#8cd600,#76b900); box-shadow:0 4px 12px #76b90044; }
.send-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* Quick actions */
.quick-actions { padding:8px 16px 4px; display:flex; flex-wrap:wrap; gap:4px; }
.quick-btn { background:none; border:1px solid #2a2a3a; border-radius:16px; padding:4px 12px; color:#888; font-size:11px; cursor:pointer; transition:all 0.2s; }
.quick-btn:hover { border-color:#76b900; color:#76b900; }

/* Map */
.map-container { position:relative; }
#map { width:100%; height:100%; }

/* Status indicator */
.status { position:absolute; top:16px; right:16px; z-index:10; background:#111118dd; backdrop-filter:blur(8px); border:1px solid #1e1e2a; border-radius:10px; padding:8px 14px; font-size:12px; }
.status .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#76b900; margin-right:6px; animation:pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Timing bar */
.timing { position:absolute; bottom:16px; left:16px; right:16px; z-index:10; background:#111118dd; backdrop-filter:blur(8px); border:1px solid #1e1e2a; border-radius:10px; padding:8px 14px; font-size:11px; color:#888; display:none; }

/* Loading */
.loading { display:none; padding:16px; text-align:center; }
.loading.active { display:block; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid #2a2a3a; border-top-color:#76b900; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:#0a0a0f; }
::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#3a3a4a; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar: Chat + Input -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>NYC Help Finder</h1>
      <p>Shelters, food, healthcare, benefits & more</p>
    </div>

    <div class="categories" id="categories">
      <button class="cat-btn" data-q="I need a shelter tonight in Brooklyn">Shelter</button>
      <button class="cat-btn" data-q="Where can I get free food near me in the Bronx?">Food</button>
      <button class="cat-btn" data-q="I need to see a doctor, no insurance, in Queens">Healthcare</button>
      <button class="cat-btn" data-q="How do I apply for SNAP benefits and Medicaid?">Benefits</button>
      <button class="cat-btn" data-q="I don't feel safe at home and I have a child">Safety</button>
      <button class="cat-btn" data-q="I just arrived in NYC and need help">New to NYC</button>
    </div>

    <div class="chat-area" id="chat">
      <div class="msg system">Tell me what's going on. I'll find the right resources for you.</div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span style="margin-left:8px;color:#888;">Finding resources for you...</span>
    </div>

    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" data-q="I'm Tina, 4 kids, income $28K, losing housing in Flatbush next week">Family losing housing</button>
      <button class="quick-btn" data-q="Someone broke into my apartment. I have a 6 year old. I don't feel safe.">Crime victim</button>
      <button class="quick-btn" data-q="A cold emergency — 200 people outside, 15 degrees, Brooklyn shelters full">Cold emergency</button>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="queryInput" rows="2" placeholder="Describe your situation..."></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuery()">Find Help</button>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="statusText">Connecting...</span>
    </div>
    <div class="timing" id="timing"></div>
  </div>
</div>

<script>
// ── Map Setup (MapLibre + deck.gl) ──────────────────────────────────────────
const NYC_CENTER = [-73.98, 40.75];
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: NYC_CENTER,
  zoom: 11,
  pitch: 45,
  bearing: -10,
});

let deckOverlay = null;
let allResources = [];

// Load initial resources for map
fetch('/api/resources').then(r => r.json()).then(data => {
  allResources = data;
  updateMapLayers(data);
});

// Load status
fetch('/api/status').then(r => r.json()).then(data => {
  document.getElementById('statusText').textContent =
    `${data.resources?.toLocaleString() || '?'} resources | ${data.llm || 'connecting...'}`;
});

function updateMapLayers(resources, highlighted = []) {
  const highlightIds = new Set(highlighted.map(r => r.name));

  // All resources layer (dim)
  const bgData = resources.filter(r => r.latitude && r.longitude && !highlightIds.has(r.name));
  // Highlighted results (bright)
  const fgData = highlighted.filter(r => r.lat && r.lon);

  const typeColors = {
    shelter: [118, 185, 0],       // NVIDIA green
    food_bank: [255, 183, 77],    // orange
    hospital: [239, 83, 80],      // red
    school: [66, 165, 245],       // blue
    benefits_center: [171, 71, 188], // purple
    domestic_violence: [255, 112, 67], // deep orange
    transit_station: [120, 120, 120], // gray
  };

  const layers = [
    new deck.ScatterplotLayer({
      id: 'bg-resources',
      data: bgData,
      getPosition: d => [d.longitude, d.latitude],
      getRadius: 30,
      getFillColor: d => [...(typeColors[d.resource_type] || [100,100,100]), 40],
      radiusMinPixels: 2,
      radiusMaxPixels: 6,
      pickable: true,
      onHover: ({object, x, y}) => {
        const tooltip = document.getElementById('map');
        tooltip.title = object ? `${object.name} (${object.resource_type})` : '';
      },
    }),
    new deck.ScatterplotLayer({
      id: 'fg-results',
      data: fgData,
      getPosition: d => [d.lon, d.lat],
      getRadius: 80,
      getFillColor: d => [...(typeColors[d.type] || [118,185,0]), 200],
      radiusMinPixels: 6,
      radiusMaxPixels: 20,
      pickable: true,
      stroked: true,
      getLineColor: [255, 255, 255, 180],
      lineWidthMinPixels: 2,
    }),
  ];

  if (deckOverlay) {
    deckOverlay.setProps({ layers });
  } else {
    deckOverlay = new deck.MapboxOverlay({ layers });
    map.addControl(deckOverlay);
  }

  // Fly to results if any
  if (fgData.length > 0) {
    const avgLat = fgData.reduce((s,d) => s + d.lat, 0) / fgData.length;
    const avgLon = fgData.reduce((s,d) => s + d.lon, 0) / fgData.length;
    map.flyTo({ center: [avgLon, avgLat], zoom: 13, pitch: 50, duration: 1500 });
  }
}

// ── Chat Logic ──────────────────────────────────────────────────────────────
function addMessage(text, role, cards = null) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  if (role === 'assistant' && cards && cards.length > 0) {
    let html = text.replace(/\n/g, '<br>');
    html += '<div style="margin-top:12px;">';
    for (const r of cards) {
      html += `
        <div class="resource-card" onclick="flyTo(${r.lat},${r.lon})">
          <div class="name">${r.name}</div>
          <div class="addr">${r.address || 'Address not available'}</div>
          <div class="meta">
            <span class="badge type">${r.type || r.need || ''}</span>
            <span class="badge">${r.borough || ''}</span>
            ${r.safety ? `<span class="badge">Safety: ${(r.safety*100).toFixed(0)}%</span>` : ''}
          </div>
        </div>`;
    }
    html += '</div>';
    msg.innerHTML = html;
  } else {
    msg.innerHTML = text.replace(/\n/g, '<br>');
  }

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function flyTo(lat, lon) {
  if (lat && lon) map.flyTo({ center: [lon, lat], zoom: 15, pitch: 55, duration: 1000 });
}

async function sendQuery() {
  const input = document.getElementById('queryInput');
  const query = input.value.trim();
  if (!query) return;

  addMessage(query, 'user');
  input.value = '';

  const loading = document.getElementById('loading');
  const sendBtn = document.getElementById('sendBtn');
  loading.classList.add('active');
  sendBtn.disabled = true;

  try {
    const resp = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, demo_mode: true }),
    });
    const data = await resp.json();

    addMessage(data.answer || 'No response', 'assistant', data.resources || []);

    // Update map
    if (data.resources && data.resources.length > 0) {
      updateMapLayers(allResources, data.resources);
    }

    // Show timing
    if (data.timing) {
      const t = data.timing;
      const timingEl = document.getElementById('timing');
      timingEl.textContent = `${t.total}s total | Plan ${t.plan}s | Execute ${t.execute}s | Synth ${t.synth}s | ${data.llm || ''}`;
      timingEl.style.display = 'block';
    }
  } catch (err) {
    addMessage(`Error: ${err.message}`, 'system');
  }

  loading.classList.remove('active');
  sendBtn.disabled = false;
}

// Enter key to send
document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});

// Category + quick action buttons
document.querySelectorAll('.cat-btn, .quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('queryInput').value = btn.dataset.q;
    sendQuery();
  });
});
</script>
</body>
</html>
