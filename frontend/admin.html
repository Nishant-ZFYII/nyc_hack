<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Services — Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f5f2;--bg2:#ffffff;--bg3:#f0ede8;--bg4:#e8e4de;
  --border:#ddd8d0;--border2:#ccc6bc;
  --t1:#2c2c30;--t2:#5a5a66;--t3:#8a8a96;
  --green:#3a7d0a;--green-d:#3a7d0a22;
  --orange:#e8843a;--red:#d94040;--blue:#2e7dba;--purple:#7b5ea7;--coral:#e06850;--teal:#3a9a8e;
  --ui:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--display:'Fraunces',Georgia,serif;
  --shadow:0 2px 8px rgba(0,0,0,0.06);--shadow-hover:0 4px 16px rgba(0,0,0,0.1);
}
body{font-family:var(--ui);background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* Pages */
.page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.page.active{display:flex}
.page-scroll{flex:1;overflow-y:auto}

/* Layout */
.centered-wide{max-width:780px;margin:0 auto;padding:24px;width:100%}

/* Header bar */
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg2);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.topbar-title{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--blue)}
.topbar-back{background:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--t2);font-size:12px;cursor:pointer;font-family:var(--ui);transition:all 0.2s}
.topbar-back:hover{border-color:var(--blue);color:var(--blue)}
.topbar-right{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3)}

/* Buttons */
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:14px 28px;font-weight:700;font-size:14px;font-family:var(--mono);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase;width:100%}
.btn-primary:hover{background:#245f8c;box-shadow:0 4px 16px rgba(46,125,186,0.25);transform:translateY(-1px)}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 20px;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:var(--ui)}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}

/* Tags */
.rc-tag{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:0.3px;text-transform:uppercase}
.rc-tag.type{background:rgba(118,185,0,0.1);color:var(--green);border:1px solid var(--green-d)}

/* Loading */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.4s ease both}

/* Scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Admin urgency badges ── */
.urgency-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase}
.urgency-critical{background:rgba(217,64,64,0.1);color:var(--red);border:1px solid rgba(217,64,64,0.25)}
.urgency-high{background:rgba(232,132,58,0.1);color:var(--orange);border:1px solid rgba(232,132,58,0.25)}
.urgency-medium{background:rgba(46,125,186,0.1);color:var(--blue);border:1px solid rgba(46,125,186,0.25)}
.urgency-low{background:rgba(138,138,150,0.08);color:var(--t3);border:1px solid var(--border)}

/* ── Admin case card ── */
.admin-case-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.admin-case-card:hover{border-color:var(--blue);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.admin-case-card.urgency-critical-card{border-left:4px solid var(--red)}
.admin-case-card.urgency-high-card{border-left:4px solid var(--orange)}
.admin-case-card.urgency-medium-card{border-left:4px solid var(--blue)}

/* ── Briefing sections ── */
.brief-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.brief-section-title{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.brief-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Doc row ── */
.doc-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-name{font-weight:600;font-size:13px;flex:1}
.doc-sub{font-size:11px;color:var(--t2);margin-top:2px}
.gap-high{color:var(--orange);font-size:10px;font-weight:700;font-family:var(--mono)}
.gap-low{color:var(--green);font-size:10px;font-weight:700;font-family:var(--mono)}

/* ── Edge case card ── */
.edge-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.edge-issue{font-weight:600;font-size:13px;color:var(--t1);margin-bottom:6px}
.edge-workaround{font-size:12px;color:var(--green);padding:6px 10px;background:rgba(58,125,10,0.06);border-radius:6px;margin-bottom:6px}
.edge-risk{font-size:11px;color:var(--orange)}
.edge-action{font-size:12px;font-weight:600;color:var(--t1);margin-top:6px}

/* ── Timeline ── */
.timeline-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.timeline-item:last-child{border-bottom:none}
.timeline-ts{color:var(--t3);font-family:var(--mono);font-size:10px;white-space:nowrap;padding-top:1px;min-width:110px}
.timeline-text{color:var(--t1);line-height:1.4}

/* ── Pre-arrival box ── */
.prearival-box{background:rgba(46,125,186,0.06);border:1px solid rgba(46,125,186,0.2);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--t1);line-height:1.6;cursor:pointer;transition:all 0.2s}
.prearival-box:hover{background:rgba(46,125,186,0.1)}

/* ── State buttons ── */
.state-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--t2);font-size:11px;font-weight:600;font-family:var(--mono);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.state-btn:hover{border-color:var(--blue);color:var(--blue)}
.state-btn.active-state{background:rgba(46,125,186,0.1);border-color:var(--blue);color:var(--blue)}
.state-btn.danger{border-color:rgba(217,64,64,0.3);color:var(--red)}
.state-btn.danger:hover{background:rgba(217,64,64,0.06)}
.state-btn.success{border-color:rgba(58,125,10,0.3);color:var(--green)}
.state-btn.success:hover{background:rgba(58,125,10,0.06)}

/* ── Admin summary bar ── */
.admin-summary-bar{display:flex;gap:12px;padding:12px 0 16px;flex-wrap:wrap}
.admin-stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center;flex:1;min-width:80px}
.admin-stat-num{font-size:22px;font-weight:700;font-family:var(--mono)}
.admin-stat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* ── Search + filter bar ── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-search{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--ui);background:var(--bg2);color:var(--t1);outline:none;transition:border-color 0.2s}
.filter-search:focus{border-color:var(--blue)}
.filter-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--t2);font-size:11px;font-weight:600;font-family:var(--mono);cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.3px}
.filter-chip:hover{border-color:var(--blue);color:var(--blue)}
.filter-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.filter-chip.chip-critical.active{background:var(--red);border-color:var(--red)}
.filter-chip.chip-high.active{background:var(--orange);border-color:var(--orange)}

/* ── Admin notes textarea ── */
.admin-notes-area{width:100%;min-height:90px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--ui);color:var(--t1);background:var(--bg3);resize:vertical;outline:none;transition:border-color 0.2s;line-height:1.5}
.admin-notes-area:focus{border-color:var(--blue);background:var(--bg2)}

/* ── Eligibility row ── */
.elig-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.elig-row:last-child{border-bottom:none}
.elig-badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);text-transform:uppercase}
.elig-eligible{background:rgba(58,125,10,0.1);color:var(--green)}
.elig-likely{background:rgba(46,125,186,0.1);color:var(--blue)}
.elig-ineligible{background:rgba(138,138,150,0.08);color:var(--t3)}

/* ── Need resolve button ── */
.need-resolve-btn{padding:4px 8px;border-radius:5px;border:1px solid rgba(58,125,10,0.25);background:none;color:var(--green);font-size:10px;font-weight:600;font-family:var(--mono);cursor:pointer;transition:all 0.2s;text-transform:uppercase;margin-left:auto;white-space:nowrap}
.need-resolve-btn:hover{background:rgba(58,125,10,0.08)}
.need-resolve-btn.in-progress{border-color:rgba(232,132,58,0.3);color:var(--orange)}
.need-resolve-btn.in-progress:hover{background:rgba(232,132,58,0.08)}

/* Print styles */
@media print{
  .topbar,.filter-bar,.btn-primary,.btn-secondary,.state-btn,.topbar-back,.admin-notes-area+div,button{display:none!important}
  body,html{overflow:auto!important;height:auto!important}
  .page{position:static!important;display:block!important}
  .page:not(#page-briefing){display:none!important}
  .page-scroll{overflow:visible!important}
  .brief-section{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
  @page{margin:20mm}
}
</style>
</head>
<body>

<!-- ═══════════ PAGE: ADMIN DASHBOARD ═══════════ -->
<div class="page active" id="page-admin">
  <div class="topbar">
    <span class="topbar-title">&#128203; Admin Dashboard</span>
    <span class="topbar-right" id="adminRefreshLabel"></span>
    <button class="btn-secondary" style="padding:6px 14px;font-size:11px;margin-left:12px" onclick="loadAdminCases()">&#8635; Refresh</button>
  </div>
  <div class="page-scroll">
    <div class="centered-wide" style="padding-top:16px">
      <div class="admin-summary-bar" id="adminSummaryBar"></div>

      <!-- Filter / search bar -->
      <div class="filter-bar" id="filterBar">
        <input class="filter-search" id="caseSearch" type="text" placeholder="Search by name or ID..." oninput="applyFilters()">
        <button class="filter-chip active" id="chip-all"    onclick="setUrgencyFilter('all')"     >All</button>
        <button class="filter-chip chip-critical" id="chip-critical" onclick="setUrgencyFilter('critical')" >Critical</button>
        <button class="filter-chip chip-high"     id="chip-high"     onclick="setUrgencyFilter('high')"     >High</button>
        <button class="filter-chip"               id="chip-medium"   onclick="setUrgencyFilter('medium')"   >Medium</button>
        <button class="filter-chip"               id="chip-en-route" onclick="setUrgencyFilter('en_route')" >En Route</button>
      </div>

      <div id="adminCaseList">
        <div style="text-align:center;padding:60px;color:var(--t3);font-family:var(--mono);font-size:13px">
          <div class="spinner" style="margin:0 auto 16px"></div>
          Loading cases...
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ PAGE: BRIEFING PANEL ═══════════ -->
<div class="page" id="page-briefing">
  <div class="topbar">
    <button class="topbar-back" onclick="goTo('page-admin')">&#8592; Cases</button>
    <span class="topbar-title" id="briefingTopbarTitle">Briefing</span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <span id="briefingGenTime" style="font-size:10px;color:var(--t3);font-family:var(--mono)"></span>
      <button class="btn-secondary" style="padding:6px 12px;font-size:11px" onclick="window.print()" title="Print briefing">&#128438; Print</button>
      <button class="btn-secondary" style="padding:6px 12px;font-size:11px" onclick="regenerateBriefing()">&#8635; Refresh</button>
    </div>
  </div>
  <div class="page-scroll">
    <div class="centered-wide" style="padding:16px 24px 40px" id="briefingContent">
      <div style="text-align:center;padding:60px;color:var(--t3);font-family:var(--mono);font-size:13px">Select a case from the dashboard.</div>
    </div>
  </div>
</div>

<script>
// ── Page navigation ──────────────────────────────────────────
function goTo(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(pageId === 'page-admin') loadAdminCases();
}

// ══════════════════════════════════════════════════════════
// ADMIN DASHBOARD
// ══════════════════════════════════════════════════════════

let _adminRefreshTimer = null;
let _activeBriefing = {caseId:'', resourceName:'', resourceType:'', resourceAddress:''};
let _allCases = [];
let _urgencyFilter = 'all';

// ── Admin case list ───────────────────────────────────────
async function loadAdminCases() {
  try {
    const resp = await fetch('/api/admin/cases');
    _allCases = await resp.json();
    renderAdminCaseList(_allCases);
    const label = document.getElementById('adminRefreshLabel');
    if(label) label.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('adminCaseList').innerHTML =
      `<div style="color:var(--red);padding:20px;font-size:13px">Error loading cases: ${e.message}</div>`;
  }
}

function setUrgencyFilter(f) {
  _urgencyFilter = f;
  ['all','critical','high','medium','en_route'].forEach(k => {
    const el = document.getElementById('chip-' + k);
    if(el) el.classList.toggle('active', k === f);
  });
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('caseSearch')?.value || '').toLowerCase().trim();
  let filtered = _allCases;

  if(_urgencyFilter !== 'all') {
    if(_urgencyFilter === 'en_route') {
      filtered = filtered.filter(c => c.active_destination_count > 0);
    } else {
      filtered = filtered.filter(c => c.urgency === _urgencyFilter);
    }
  }
  if(q) {
    filtered = filtered.filter(c =>
      (c.name || '').toLowerCase().includes(q) ||
      (c.case_id || '').toLowerCase().includes(q)
    );
  }
  renderAdminCaseList(filtered, true);
}

function renderAdminCaseList(cases, skipStats) {
  const bar = document.getElementById('adminSummaryBar');
  const list = document.getElementById('adminCaseList');
  if(!list) return;

  if(bar && !skipStats) {
    const critical = _allCases.filter(c => c.urgency === 'critical').length;
    const high = _allCases.filter(c => c.urgency === 'high').length;
    const activeDest = _allCases.filter(c => c.active_destination_count > 0).length;
    const resolved = _allCases.filter(c => (c.open_needs_list||[]).length === 0 && c.total_visits > 0).length;
    bar.innerHTML = `
      <div class="admin-stat"><div class="admin-stat-num" style="color:var(--t1)">${_allCases.length}</div><div class="admin-stat-label">Total Cases</div></div>
      <div class="admin-stat"><div class="admin-stat-num" style="color:var(--red)">${critical}</div><div class="admin-stat-label">Critical</div></div>
      <div class="admin-stat"><div class="admin-stat-num" style="color:var(--orange)">${high}</div><div class="admin-stat-label">High</div></div>
      <div class="admin-stat"><div class="admin-stat-num" style="color:var(--blue)">${activeDest}</div><div class="admin-stat-label">En Route</div></div>
      <div class="admin-stat"><div class="admin-stat-num" style="color:var(--green)">${resolved}</div><div class="admin-stat-label">Resolved</div></div>
    `;
  }

  if(!cases.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--t3);font-family:var(--mono);font-size:13px">No cases match the current filter.</div>`;
    return;
  }

  let html = '';
  for(const c of cases) {
    const urgBadge = urgencyBadge(c.urgency);
    const leftClass = c.urgency === 'critical' ? 'urgency-critical-card' :
                      c.urgency === 'high' ? 'urgency-high-card' :
                      c.urgency === 'medium' ? 'urgency-medium-card' : '';
    const needTags = (c.open_needs_list || []).slice(0, 3).map(n =>
      `<span class="rc-tag type" style="font-size:9px">${(n.category || '').replace(/_/g, ' ')}</span>`
    ).join('');
    const lastVisit = c.last_visit ? c.last_visit.slice(0, 16).replace('T', ' ') : '—';
    const ecIcon = c.ec_registered ? '&#128241;' : (c.emergency_contact?.name ? '&#9888;&#65038;' : '');

    let destLine = '';
    const dest = (c.active_destinations || [])[0];
    if(dest) {
      const stateColors = {intent_confirmed:'var(--t3)',notified:'var(--blue)',acknowledged:'var(--blue)',en_route:'var(--orange)',arrived:'var(--green)'};
      const stateColor = stateColors[dest.state] || 'var(--t3)';
      destLine = `<div style="margin-top:6px;font-size:11px"><span style="color:${stateColor};font-weight:600;font-family:var(--mono)">${(dest.state || '').replace(/_/g, ' ').toUpperCase()}</span><span style="color:var(--t3)"> &rarr; ${dest.resource_name || ''}</span></div>`;
    }

    const activeDest = (c.active_destinations || [])[0];
    const rName = activeDest ? encodeURIComponent(activeDest.resource_name || '') : '';
    const rType = activeDest ? encodeURIComponent(activeDest.resource_type || '') : '';
    const rAddr = activeDest ? encodeURIComponent(activeDest.address || '') : '';

    html += `<div class="admin-case-card ${leftClass} fade-in" onclick="openBriefing('${c.case_id}',decodeURIComponent('${rName}'),decodeURIComponent('${rType}'),decodeURIComponent('${rAddr}'))">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-weight:700;font-size:15px">${c.name || c.case_id}</span>
            ${urgBadge}
            ${ecIcon ? `<span style="font-size:12px">${ecIcon}</span>` : ''}
          </div>
          <div style="font-size:11px;color:var(--t3);font-family:var(--mono);margin-bottom:6px">${c.case_id} &middot; ${c.total_visits || 0} visit(s) &middot; last: ${lastVisit}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">${needTags}</div>
          ${destLine}
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${c.failed_resource_count > 0 ? `<div style="font-size:10px;color:var(--orange);font-family:var(--mono)">${c.failed_resource_count} failed</div>` : ''}
          <div style="font-size:18px;color:var(--t3);margin-top:4px">&#8250;</div>
        </div>
      </div>
    </div>`;
  }
  list.innerHTML = html;
}

function urgencyBadge(u) {
  const map = {critical:'urgency-critical', high:'urgency-high', medium:'urgency-medium', low:'urgency-low'};
  const icons = {critical:'&#9888;&#65038;', high:'&#9650;', medium:'&#9679;', low:'&#9679;'};
  return `<span class="urgency-badge ${map[u] || 'urgency-low'}">${icons[u] || ''} ${u || 'low'}</span>`;
}

// ── Open briefing for a case ──────────────────────────────
function openBriefing(caseId, resourceName, resourceType, resourceAddress) {
  _activeBriefing = {caseId, resourceName, resourceType, resourceAddress};
  goTo('page-briefing');
  loadBriefing(caseId, resourceName, resourceType, resourceAddress);
}

// ── Auto-refresh every 15s ────────────────────────────────
function startAdminRefresh() {
  if(_adminRefreshTimer) clearInterval(_adminRefreshTimer);
  _adminRefreshTimer = setInterval(() => {
    if(document.getElementById('page-admin').classList.contains('active')) loadAdminCases();
  }, 15000);
}

// ══════════════════════════════════════════════════════════
// BRIEFING PANEL
// ══════════════════════════════════════════════════════════

async function loadBriefing(caseId, resourceName, resourceType, resourceAddress) {
  const el = document.getElementById('briefingContent');
  const titleEl = document.getElementById('briefingTopbarTitle');
  el.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;padding:60px;gap:16px"><div class="spinner"></div><div style="color:var(--t3);font-family:var(--mono);font-size:12px">Generating AI briefing...</div></div>`;
  try {
    const resp = await fetch('/api/admin/briefing', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({case_id: caseId, resource_name: resourceName, resource_type: resourceType, resource_address: resourceAddress})
    });
    if(!resp.ok) throw new Error(`Server error ${resp.status}`);
    const b = await resp.json();
    if(titleEl) titleEl.textContent = `Briefing: ${b.client_name || caseId}`;
    const genEl = document.getElementById('briefingGenTime');
    if(genEl) genEl.textContent = (b.llm_powered ? 'AI' : 'Rule-based') + ' · ' + (b.generated_at || '').slice(11, 16);
    el.innerHTML = renderFullBriefing(b);
    // Load existing admin notes after render
    loadAdminNotes(caseId);
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red);padding:20px;font-size:13px">Error generating briefing: ${e.message}</div>`;
  }
}

function regenerateBriefing() {
  const {caseId, resourceName, resourceType, resourceAddress} = _activeBriefing;
  if(caseId) loadBriefing(caseId, resourceName, resourceType, resourceAddress);
}

function renderFullBriefing(b) {
  return renderBriefingSnapshot(b)
    + renderBriefingDiagnosis(b)
    + renderBriefingDocs(b)
    + renderBriefingEdgeCases(b)
    + renderBriefingEligibility(b)
    + renderBriefingKnowledge(b)
    + renderBriefingAlternatives(b)
    + renderBriefingTimeline(b)
    + renderBriefingAdminNotes(b)
    + renderBriefingActions(b);
}

// ── Section 1: Client snapshot ────────────────────────────
function renderBriefingSnapshot(b) {
  const needs = b.all_needs || [];
  const resolvedNeeds = needs.filter(n => n.status === 'resolved');
  const pct = needs.length ? Math.round((resolvedNeeds.length / needs.length) * 100) : 0;
  const ec = b.emergency_contact || {};

  let destHtml = '';
  if(b.resource_name && b.resource_name !== 'Unknown') {
    destHtml = `<div style="margin-top:10px;padding:10px 14px;background:rgba(58,125,10,0.06);border:1px solid rgba(58,125,10,0.15);border-radius:8px">
      <div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Destination</div>
      <div style="font-weight:600;font-size:14px">${b.resource_name}</div>
      ${b.resource_address ? `<div style="font-size:12px;color:var(--t2);font-family:var(--mono)">${b.resource_address}</div>` : ''}
      <div style="font-size:11px;color:var(--t3);margin-top:4px;text-transform:capitalize">${(b.resource_type || '').replace(/_/g, ' ')}</div>
    </div>`;
  }

  const ecHtml = ec.name ? `<div style="margin-top:8px;font-size:12px;color:var(--t2)">
    <b>EC:</b> ${ec.name}${ec.telegram_username ? ' (@' + ec.telegram_username + ')' : ''}
    <span style="margin-left:6px;font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono);background:${ec.telegram_chat_id ? 'rgba(58,125,10,0.1)' : 'rgba(232,132,58,0.1)'};color:${ec.telegram_chat_id ? 'var(--green)' : 'var(--orange)'}">
      ${ec.telegram_chat_id ? 'DM registered' : 'Not registered'}
    </span>
  </div>` : '';

  let needRows = '';
  for(const n of needs) {
    const icon = n.status === 'resolved' ? '&#9989;' : n.status === 'in_progress' ? '&#9203;' : '&#9898;';
    const color = n.status === 'resolved' ? 'var(--green)' : n.status === 'in_progress' ? 'var(--orange)' : 'var(--t3)';
    const resolveBtn = n.status !== 'resolved'
      ? `<button class="need-resolve-btn ${n.status === 'in_progress' ? '' : 'in-progress'}" onclick="updateNeedStatus('${b.case_id}','${n.category}','${n.status === 'in_progress' ? 'resolved' : 'in_progress'}');event.stopPropagation()">
          ${n.status === 'in_progress' ? '&#9989; Resolve' : '&#9203; In Progress'}
        </button>`
      : '';
    needRows += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <span>${icon}</span>
      <div style="flex:1;font-size:13px;font-weight:600;color:${color};text-transform:capitalize">${(n.category || '').replace(/_/g, ' ')}</div>
      ${n.chosen_resource ? `<div style="font-size:11px;color:var(--t3)">${n.chosen_resource}</div>` : ''}
      ${resolveBtn}
    </div>`;
  }

  return `<div class="brief-section">
    <div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <div style="font-size:22px;font-weight:700;margin-bottom:2px">${b.client_name || b.case_id}</div>
        <div style="font-size:11px;font-family:var(--mono);color:var(--t3)">${b.case_id} &middot; ${b.total_visits || 0} visit(s)</div>
        ${ecHtml}
        ${destHtml}
      </div>
      <div style="flex:1;min-width:180px">
        <div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Progress (${resolvedNeeds.length}/${needs.length})</div>
        <div style="background:var(--bg4);border-radius:6px;height:6px;margin-bottom:10px;overflow:hidden"><div style="background:var(--green);height:100%;width:${pct}%;border-radius:6px;transition:width 0.5s"></div></div>
        ${needRows}
      </div>
    </div>
  </div>`;
}

// ── Section 2: AI diagnosis ───────────────────────────────
function renderBriefingDiagnosis(b) {
  const urgBorderMap = {critical:'var(--red)', high:'var(--orange)', medium:'var(--blue)', low:'var(--border)'};
  const border = urgBorderMap[b.urgency] || 'var(--border)';

  let missingHtml = '';
  if((b.missing_info || []).length) {
    missingHtml = `<div style="margin-top:10px;padding:8px 12px;background:rgba(232,132,58,0.06);border-radius:6px;border-left:3px solid var(--orange)">
      <div style="font-size:10px;font-family:var(--mono);color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Missing Info</div>
      ${b.missing_info.map(m => `<div style="font-size:12px;color:var(--t2)">&middot; ${m}</div>`).join('')}
    </div>`;
  }

  const likelyNeeds = (b.likely_needs || []).map(n => `<span class="rc-tag type" style="margin-right:4px;margin-bottom:4px">${n}</span>`).join('');

  return `<div class="brief-section" style="border-color:${border}">
    <div class="brief-section-title">AI Diagnosis</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      ${urgencyBadge(b.urgency)}
      <span style="font-size:12px;color:var(--t2)">${b.urgency_reason || ''}</span>
    </div>
    <div style="font-size:14px;line-height:1.7;color:var(--t1);margin-bottom:10px">${b.diagnosis || 'No diagnosis available.'}</div>
    ${likelyNeeds ? `<div style="margin-bottom:10px">${likelyNeeds}</div>` : ''}
    ${b.recommended_approach ? `<div style="padding:10px 14px;background:rgba(58,125,10,0.06);border-radius:8px;font-size:13px;line-height:1.6;border-left:3px solid var(--green)"><b style="font-size:10px;font-family:var(--mono);color:var(--green);text-transform:uppercase;display:block;margin-bottom:4px">Recommended Approach</b>${b.recommended_approach}</div>` : ''}
    ${b.pre_arrival_instructions ? `<div style="margin-top:10px"><div style="font-size:10px;font-family:var(--mono);color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Pre-Arrival Instructions (send to client)</div><div class="prearival-box" onclick="navigator.clipboard&&navigator.clipboard.writeText(this.dataset.text).then(()=>this.style.background='rgba(58,125,10,0.1)')" data-text="${(b.pre_arrival_instructions || '').replace(/"/g, '&quot;')}" title="Click to copy">${b.pre_arrival_instructions} <span style="font-size:10px;color:var(--t3)">[click to copy]</span></div></div>` : ''}
    ${missingHtml}
  </div>`;
}

// ── Section 3: Document checklist ────────────────────────
function renderBriefingDocs(b) {
  const docs = b.required_docs || [];
  if(!docs.length) return '';

  let rows = '';
  for(const d of docs) {
    const gapClass = d.gap_risk === 'high' ? 'gap-high' : d.gap_risk === 'medium' ? 'gap-high' : 'gap-low';
    const reqBadge = d.required
      ? `<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(217,64,64,0.1);color:var(--red);font-family:var(--mono);font-weight:700">REQUIRED</span>`
      : `<span style="font-size:9px;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--t3);font-family:var(--mono)">optional</span>`;
    rows += `<div class="doc-row">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span class="doc-name">${d.doc}</span>${reqBadge}
          ${d.gap_risk ? `<span class="${gapClass}">&#9650; ${d.gap_risk} gap risk</span>` : ''}
        </div>
        ${d.gap_reason ? `<div style="font-size:11px;color:var(--orange);margin-bottom:4px">${d.gap_reason}</div>` : ''}
        ${d.substitute ? `<div class="doc-sub"><b style="color:var(--green)">Substitute:</b> ${d.substitute}</div>` : ''}
        ${d.fallback_process ? `<div class="doc-sub" style="margin-top:2px"><b>Fallback:</b> ${d.fallback_process}</div>` : ''}
      </div>
    </div>`;
  }

  return `<div class="brief-section">
    <div class="brief-section-title">Document Checklist</div>
    ${rows}
  </div>`;
}

// ── Section 4: Edge cases ─────────────────────────────────
function renderBriefingEdgeCases(b) {
  const edges = b.edge_cases || [];
  if(!edges.length) return '';

  let cards = '';
  for(const e of edges) {
    cards += `<div class="edge-card">
      <div class="edge-issue">&#9888;&#65038; ${e.issue || ''}</div>
      ${e.workaround ? `<div class="edge-workaround">&#9989; Workaround: ${e.workaround}</div>` : ''}
      ${e.risk ? `<div class="edge-risk">&#9888; Risk: ${e.risk}</div>` : ''}
      ${e.next_action ? `<div class="edge-action">Next action: ${e.next_action}</div>` : ''}
    </div>`;
  }

  return `<div class="brief-section">
    <div class="brief-section-title">Edge Cases &amp; Workarounds</div>
    ${cards}
  </div>`;
}

// ── Section 5: Eligibility ────────────────────────────────
function renderBriefingEligibility(b) {
  const elig = b.eligibility || {};
  const programs = Object.entries(elig);
  if(!programs.length) return '';

  // Filter to only interesting keys (skip metadata)
  const show = programs.filter(([k]) => !['household_size','monthly_income','fpl_percent'].includes(k));
  if(!show.length) return '';

  const fplLine = elig.fpl_percent != null
    ? `<div style="font-size:11px;color:var(--t3);margin-bottom:10px;font-family:var(--mono)">Household FPL: <b style="color:var(--t1)">${Math.round(elig.fpl_percent)}%</b> &middot; Size: ${elig.household_size || '?'} &middot; Monthly income: $${elig.monthly_income != null ? elig.monthly_income.toLocaleString() : '?'}</div>`
    : '';

  let rows = '';
  for(const [prog, val] of show) {
    if(typeof val !== 'object' || val === null) continue;
    const eligible = val.eligible === true || val.eligible === 'yes' || val.status === 'eligible';
    const likely = val.eligible === 'likely' || val.status === 'likely';
    const badge = eligible
      ? `<span class="elig-badge elig-eligible">Eligible</span>`
      : likely
      ? `<span class="elig-badge elig-likely">Likely</span>`
      : `<span class="elig-badge elig-ineligible">Review</span>`;

    const note = val.note || val.reason || val.message || '';
    const amount = val.monthly_benefit != null
      ? `<span style="font-family:var(--mono);font-size:12px;color:var(--green);margin-left:8px">$${val.monthly_benefit}/mo</span>`
      : '';

    rows += `<div class="elig-row">
      <div style="flex:1">
        <span style="font-weight:600;text-transform:capitalize">${prog.replace(/_/g,' ')}</span>
        ${amount}
        ${note ? `<div style="font-size:11px;color:var(--t2);margin-top:2px">${note}</div>` : ''}
      </div>
      ${badge}
    </div>`;
  }

  if(!rows) return '';
  return `<div class="brief-section">
    <div class="brief-section-title">Eligibility Snapshot</div>
    ${fplLine}${rows}
  </div>`;
}

// ── Section 6: Knowledge & protocols ─────────────────────
function renderBriefingKnowledge(b) {
  let html = `<div class="brief-section"><div class="brief-section-title">Knowledge &amp; Protocols</div>`;

  if(b.service_protocol) {
    html += `<div style="margin-bottom:12px"><div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Service Protocol</div><div style="font-size:13px;color:var(--t1);line-height:1.7">${b.service_protocol}</div></div>`;
  }

  if(b.knowledge_notes && b.knowledge_notes !== b.service_protocol) {
    html += `<div style="margin-bottom:12px;padding:10px 14px;background:rgba(123,94,167,0.06);border-radius:8px;border-left:3px solid var(--purple)"><div style="font-size:10px;font-family:var(--mono);color:var(--purple);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">AI Knowledge Notes</div><div style="font-size:13px;color:var(--t1);line-height:1.7">${b.knowledge_notes}</div></div>`;
  }

  if((b.rights_info || []).length) {
    const rights = b.rights_info.map(r => `<div style="font-size:12px;color:var(--t2);padding:4px 0;border-bottom:1px solid var(--border)">${typeof r === 'string' ? r : JSON.stringify(r)}</div>`).join('');
    html += `<details style="margin-bottom:8px"><summary style="cursor:pointer;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;list-style:none">&#9660; Know Your Rights</summary><div style="margin-top:8px;padding-left:8px">${rights}</div></details>`;
  }

  if((b.success_stories || []).length) {
    const stories = b.success_stories.map(s => `<div style="padding:10px;background:var(--bg3);border-radius:8px;margin-bottom:6px;font-size:12px;color:var(--t1);line-height:1.6">${typeof s === 'string' ? s : JSON.stringify(s)}</div>`).join('');
    html += `<details><summary style="cursor:pointer;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;list-style:none">&#9660; Success Stories</summary><div style="margin-top:8px">${stories}</div></details>`;
  }

  if((b.reasoning_path || []).length) {
    const path = b.reasoning_path.slice(0, 5).map(r =>
      `<div style="font-size:11px;color:var(--t2);padding:3px 0"><span style="font-family:var(--mono);color:var(--t3)">[hop ${r.hop || 0}]</span> ${r.subject || ''} → <b>${r.predicate || ''}</b> → ${r.object || ''} <span style="color:var(--t3);font-size:10px">(conf: ${(r.confidence || 0).toFixed(2)})</span></div>`
    ).join('');
    html += `<details style="margin-top:8px"><summary style="cursor:pointer;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;list-style:none">&#9660; Resource Reasoning (KG)</summary><div style="margin-top:8px;padding-left:8px">${path}</div></details>`;
  }

  html += `</div>`;
  return html;
}

// ── Section 7: Alternative resources ─────────────────────
function renderBriefingAlternatives(b) {
  const alts = b.alternative_resources || [];
  if(!alts.length) return '';

  let cards = '';
  for(const a of alts) {
    const sim = a.similarity ? Math.round(a.similarity * 100) : null;
    cards += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px">${a.name || ''}</div>
        <div style="font-size:11px;color:var(--t3);font-family:var(--mono)">${(a.resource_type || a.type || '').replace(/_/g, ' ')} &middot; ${a.borough || ''}</div>
        ${a.address ? `<div style="font-size:11px;color:var(--t2)">${a.address}</div>` : ''}
      </div>
      ${sim !== null ? `<div style="text-align:center;flex-shrink:0"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:var(--green)">${sim}%</div><div style="font-size:9px;color:var(--t3)">match</div></div>` : ''}
    </div>`;
  }

  return `<div class="brief-section">
    <div class="brief-section-title">If Primary Fails — Alternatives</div>
    ${cards}
  </div>`;
}

// ── Section 8: History timeline ───────────────────────────
function renderBriefingTimeline(b) {
  const timeline = b.history_timeline || [];
  if(!timeline.length) return '';

  const icons = {Query:'&#128172;', Visited:'&#9989;', Failed:'&#10060;', Feedback:'&#9888;&#65038;'};
  let rows = '';
  for(const item of timeline.slice(-15)) {
    const match = item.match(/^\[(.{16})\]\s*(\w+[^:]*?):\s*(.*)/);
    if(match) {
      const [, ts, type, text] = match;
      const icon = Object.entries(icons).find(([k]) => type.toLowerCase().includes(k.toLowerCase()))?.[1] || '&#9679;';
      rows += `<div class="timeline-item"><span class="timeline-ts">${ts}</span><span style="font-size:14px;flex-shrink:0">${icon}</span><span class="timeline-text"><b>${type}:</b> ${text}</span></div>`;
    } else {
      rows += `<div class="timeline-item"><span class="timeline-ts"></span><span class="timeline-text">${item}</span></div>`;
    }
  }

  return `<div class="brief-section">
    <div class="brief-section-title">Case History</div>
    <div>${rows}</div>
  </div>`;
}

// ── Section 9: Admin notes ───────────────────────────────
function renderBriefingAdminNotes(b) {
  return `<div class="brief-section" id="adminNotesSection">
    <div class="brief-section-title">Admin Notes</div>
    <textarea class="admin-notes-area" id="adminNotesText" placeholder="Add internal notes for this case (visible to staff only, never shown to client)...">${(b.admin_notes || b.notes || '')}</textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:8px;gap:8px;align-items:center">
      <span id="notesSaveStatus" style="font-size:11px;font-family:var(--mono);color:var(--t3)"></span>
      <button class="btn-secondary" style="padding:6px 16px;font-size:12px" onclick="saveAdminNotes('${b.case_id}')">Save Notes</button>
    </div>
  </div>`;
}

// ── Section 10: Admin actions ─────────────────────────────
function renderBriefingActions(b) {
  const LIFECYCLE = ['acknowledged', 'en_route', 'arrived', 'resolved'];
  const stateLabels = {acknowledged:'Acknowledged', en_route:'En Route', arrived:'Arrived', resolved:'Resolved'};

  let stateButtons = '';
  for(const s of LIFECYCLE) {
    stateButtons += `<button class="state-btn" onclick="advanceState('${b.case_id}','${b.resource_name}','${s}')">${stateLabels[s]}</button>`;
  }

  return `<div class="brief-section">
    <div class="brief-section-title">Admin Actions</div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Advance Destination State</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${stateButtons}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="btn-primary" style="padding:10px 18px;font-size:12px;width:auto" onclick="regenerateBriefing()">&#8635; Regenerate Briefing</button>
      <button class="state-btn danger" onclick="advanceState('${b.case_id}','${b.resource_name}','cancelled')">&#10005; Cancel Destination</button>
      <button class="btn-secondary" style="padding:10px 16px;font-size:12px" onclick="window.print()">&#128438; Print</button>
    </div>
  </div>`;
}

// ── Advance destination state ─────────────────────────────
async function advanceState(caseId, resourceName, newState) {
  try {
    await fetch('/api/admin/update_state', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({case_id: caseId, resource_name: resourceName, new_state: newState})
    });
    const {resourceType, resourceAddress} = _activeBriefing;
    loadBriefing(caseId, resourceName, resourceType, resourceAddress);
  } catch(e) {
    alert('Error updating state: ' + e.message);
  }
}

// ── Update need status ────────────────────────────────────
async function updateNeedStatus(caseId, category, status) {
  try {
    await fetch('/api/admin/need_status', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({case_id: caseId, category, status})
    });
    const {resourceName, resourceType, resourceAddress} = _activeBriefing;
    loadBriefing(caseId, resourceName, resourceType, resourceAddress);
  } catch(e) {
    alert('Error updating need: ' + e.message);
  }
}

// ── Admin notes ───────────────────────────────────────────
async function loadAdminNotes(caseId) {
  try {
    const resp = await fetch(`/api/admin/case/${caseId}`);
    const c = await resp.json();
    const el = document.getElementById('adminNotesText');
    if(el && !el.value && (c.admin_notes || c.notes)) {
      el.value = c.admin_notes || c.notes || '';
    }
  } catch(e) { /* silent */ }
}

let _notesSaveTimer = null;
async function saveAdminNotes(caseId) {
  const el = document.getElementById('adminNotesText');
  const status = document.getElementById('notesSaveStatus');
  if(!el) return;
  try {
    await fetch('/api/admin/notes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({case_id: caseId, notes: el.value})
    });
    if(status) { status.textContent = 'Saved'; setTimeout(() => { if(status) status.textContent = ''; }, 2000); }
  } catch(e) {
    if(status) status.textContent = 'Error saving';
  }
}

// Auto-save notes on typing (debounced 1.5s)
document.addEventListener('input', e => {
  if(e.target.id === 'adminNotesText') {
    if(_notesSaveTimer) clearTimeout(_notesSaveTimer);
    const status = document.getElementById('notesSaveStatus');
    if(status) status.textContent = 'Unsaved...';
    _notesSaveTimer = setTimeout(() => saveAdminNotes(_activeBriefing.caseId), 1500);
  }
});

// ── Init ──────────────────────────────────────────────────
loadAdminCases();
startAdminRefresh();
</script>
</body>
</html>
